# Rust on Hyperlight - kraft configuration
specification: '0.6'
name: rust-hyperlight

unikraft:
  source: https://github.com/danbugs/unikraft.git
  version: hyperlight-platform
  kconfig:
    # Platform
    CONFIG_PLAT_HYPERLIGHT: 'y'
    CONFIG_PAGING: 'n'
    CONFIG_LIBUKVMEM: 'n'
    CONFIG_LIBUKINTCTLR_HYPERLIGHT: 'y'
    CONFIG_HYPERLIGHT_MAX_GUEST_LOG_LEVEL: 0

    # Suppress kernel logging for performance
    CONFIG_LIBUKPRINT_KLVL_CRIT: 'y'
    CONFIG_LIBUKPRINT_PRINT_TIME: 'n'
    CONFIG_LIBUKPRINT_PRINT_SRCNAME: 'n'
    CONFIG_LIBUKBOOT_BANNER_NONE: 'y'

    # Size optimization
    CONFIG_OPTIMIZE_SIZE: 'y'
    CONFIG_OPTIMIZE_PIE: 'y'

    # VFS and initrd support
    CONFIG_LIBVFSCORE: 'y'
    CONFIG_LIBVFSCORE_AUTOMOUNT_CI: 'y'
    CONFIG_LIBVFSCORE_AUTOMOUNT_CI_INITRD: 'y'
    CONFIG_LIBRAMFS: 'y'
    CONFIG_LIBUKCPIO: 'y'

    # ELF loader - Rust binary location
    CONFIG_APPELFLOADER: 'y'
    CONFIG_APPELFLOADER_VFSEXEC: 'y'
    CONFIG_APPELFLOADER_CUSTOMAPPNAME: 'n'
    CONFIG_APPELFLOADER_VFSEXEC_ENVPATH: 'n'
    CONFIG_APPELFLOADER_VFSEXEC_PATH: '/bin/hello'
    CONFIG_LIBPOSIX_ENVIRON_ENVP0: '"PATH=/bin"'
    CONFIG_LIBELF: 'y'

    # Random number support
    CONFIG_LIBUKRANDOM_CMDLINE_SEED: 'y'
    CONFIG_LIBUKRANDOM_GETRANDOM: 'y'

    # Threading support
    CONFIG_LIBUKBOOT_MAINTHREAD: 'y'
    CONFIG_LIBPOSIX_PROCESS_ARCH_PRCTL: 'y'
    CONFIG_LIBPOSIX_PROCESS_MULTITHREADING: 'y'

    # MPI provides per-CPU structures used by the scheduler, posix-process, and
    # various other subsystems; required for correct brk/malloc behaviour
    CONFIG_LIBUKMPI: 'y'

    # musl's mallocng (used by Rust stdlib) calls mmap for all allocations;
    # ukmmap provides a simple uk_alloc-backed anonymous mmap without paging
    CONFIG_LIBUKMMAP: 'y'


libraries:
  app-elfloader:
    source: https://github.com/danbugs/app-elfloader.git
    version: hyperlight-platform
  libelf:
    source: https://github.com/unikraft/lib-libelf.git
    version: staging

targets:
  - architecture: x86_64
    platform: hyperlight
